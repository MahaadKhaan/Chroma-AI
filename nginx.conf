events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Basic Settings
    sendfile        on;
    keepalive_timeout  65;

    # Security: Hide Nginx version
    server_tokens off;

    # Rate Limiting & Connection Limiting Zones
    # Define a shared memory zone for connection tracking (10MB)
    limit_conn_zone $binary_remote_addr zone=conn_limit_per_ip:10m;
    
    # Define a shared memory zone for request rate limiting (10MB, max 10 requests per second)
    limit_req_zone $binary_remote_addr zone=req_limit_per_ip:10m rate=10r/s;

    server {
        listen 80;
        server_name localhost;

        # Enforce strict request header size limitations
        client_max_body_size 15M;

        location / {
            # Apply rate limits at the network boundary
            limit_conn conn_limit_per_ip 10;
            limit_req zone=req_limit_per_ip burst=20 nodelay;

            # Proxy configuration
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Security: Mask internal service metadata
            proxy_hide_header X-Powered-By;
        }
    }
}
